---
model: "anthropic/claude-3-haiku"
input:
  records: "data/01_attr_inference/records.json"
  labels: "data/01_attr_inference/labels.json"
output_dir: "results/01_attr_inference_per_subj"
prompt_template: "prompts/01_attr_inference_per_subj/prompt.yaml"
max_subjects: 10
target_info:
  - name: formal_status
    label: "the subject's clinical diagnosis"
    type: categorical
    choices: ["HEALTHY", "MDD", "ADHD", "OCD", "INSOMNIA", "TINNITUS", "CHRONIC PAIN", "ADD", "TINNITUS/MDD"]
    guess_structure: '"guesses": ["<most likely guess>", "<optional second guess>", "<optional third guess>"]'
  - name: age
    label: "the subject's age in years"
    type: continuous
    guess_structure: '"guess": "<single integer year, e.g. 34>"'
  - name: gender
    label: "the subject's gender"
    type: binary
    choices: [0, 1]
    guess_structure: '"guess": "<guess>"'
  - name: education
    label: "the subject's education level (1-18 years)"
    type: ordinal
    guess_structure: '"guess": "<number of years of education completed, between 1 and 18>"'
...