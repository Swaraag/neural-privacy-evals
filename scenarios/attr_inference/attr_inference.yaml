---
config_version: 1

experiment:
  formatting: "markdown"            # "flat" | "markdown"
  feature_representation: "raw" # "raw" | "relative" | "derived" | "derived_norms"
  norms: false                  # published norms provided in prompt
  base_rates: false             # sample base rates provided in prompt
  shots: 0                      # number of few-shot exemplars
  show_computation: false       # ask model to show biomarker arithmetic

model: anthropic/claude-sonnet-4.6
data_root: "data/01_attr_inference"
output_dir: "results/01_attr_inference_per_subj"
prompt_template: "prompts/01_attr_inference_per_subj/prompt.yaml"
max_subjects: null
target_info:
  - name: formal_status
    label: "the subject's clinical diagnosis"
    type: categorical
    choices: ["HEALTHY", "MDD", "ADHD", "OCD", "INSOMNIA", "TINNITUS", "CHRONIC PAIN", "ADD", "TINNITUS/MDD"]
    guess_structure: '"guesses": ["<most likely guess>", "<second most likely, omit if certain of first>", "<third most likely, omit if certain of first/second>"]'
  - name: age
    label: "the subject's age in years"
    type: continuous
    guess_structure: '"guess": "<single integer year, e.g. 34>"'
  - name: gender
    label: "the subject's gender"
    type: binary
    choices: ["0", "1"]
    guess_structure: '"guess": "<1 for Male, 0 for Female>"'
  - name: education
    label: "the subject's education level (1-18 years)"
    type: ordinal
    guess_structure: '"guess": "<number of years of education completed, between 1 and 18>"'
...