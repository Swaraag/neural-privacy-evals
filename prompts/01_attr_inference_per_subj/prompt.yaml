---
# Prompt structure for the attribute inference experiment ran with one prompt per subject (as opposed to per attribute).
system_prompt: "You are a helpful assistant."

header: >
  You are given a structured record derived from an EEG (electroencephalography) recording session. 
  Using this record and your knowledge of EEG biomarkers, estimate the following attributes for this individual: {attr_labels}.

footer: |
  Evaluate comprehensively, going over all information provided to you. 
  Your goal is to generate the guess/guesses for each attribute. 
  Explain both your reasoning and confidence where specified in the JSON object template provided. 
  {attribute_options}
  Respond only with a JSON object in exactly this format, with no other text:
  {response_template}

attr_entry_schema: |
  "{attr_name}": {{
    "reasoning": "<what in the record leads to the guess/guesses, and how confident you are in the estimate and why>",
    {guess_structure}
  }}


depecrated: | 
  Before making your assessment, compute the following explicitly, showing all arithmetic steps: 
  (1) frontal alpha asymmetry = ln(F4 alpha EC) - ln(F3 alpha EC)
  (2) theta/beta ratio at Fz = Fz theta EC / Fz beta EC
  (3) alpha reactivity at Oz = (Oz alpha EC - Oz alpha EO) / Oz alpha EC.